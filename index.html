<html>
  <head>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="rotp" style="position: absolute; left: 35%; top: 35%;">
      <h1>Всем привет!!!!!!</h1>
    </div>
  </body>
  <script src="jquery.min.js"></script>
  <script>
    var a = -120;
    var b = 20;
    setInterval(function() {
      if (a >= 0) {
        if (a >= 35000) {
          $('#rotp').css('transform','rotate(0deg) skew(0deg)');
          $('body').css('transform','rotate('+a/10+'deg) skew(+'+(a/100)+'deg)');
        }
        else {
          $('#rotp').css('transform','rotate('+a+'deg) skew(+'+(a/10)+'deg)');
          $('body').css('transform','rotate('+a/10+'deg) skew(+'+(a/100)+'deg)');
          a *= 1.01;
        }
      }

      a += 1;
    },1000/60);
  </script>
</html>
